[build]
  command = "npm run build:netlify"
  publish = "dist"

# COOP/COEP enable cross origin isolation, which unlocks SharedArrayBuffer and
# multithreaded WASM (faster Whisper and Tesseract). Do not remove.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# The WASM runtime is the biggest asset (about 23 MB). Asset filenames are
# content hashed, so immutable caching is safe: returning visitors cost almost
# no bandwidth after their first load.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
